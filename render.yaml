services:
  - type: web
    name: resuscan-iwrc
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://resuscan-iwrc.onrender.com  # ← Update to your actual Render URL
